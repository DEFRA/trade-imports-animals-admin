name: E2E Tests

on:
  workflow_run:
    workflows: ["Publish Branch Image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to probe for service images (defaults to current branch)'
        required: false
        type: string

concurrency:
  group: e2e-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request')
    uses: DEFRA/trade-imports-animals-workspace/.github/workflows/e2e-tests.yml@main
    with:
      branch: ${{ inputs.branch || github.event.workflow_run.head_branch || github.ref_name }}
    secrets: inherit

  report-status:
    needs: e2e
    if: >
      always() &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Report check run on PR
        uses: actions/github-script@v7
        with:
          script: |
            const e2eResult = '${{ needs.e2e.result }}';
            const conclusion = e2eResult === 'success' ? 'success'
                             : e2eResult === 'skipped' ? 'skipped'
                             : 'failure';
            const prs = context.payload.workflow_run.pull_requests;
            for (const pr of prs) {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: pr.head.sha,
                name: 'E2E Tests',
                status: 'completed',
                conclusion,
                details_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                output: {
                  title: `Workspace E2E: ${e2eResult}`,
                  summary: `E2E test suite ${e2eResult}`
                }
              });
            }
