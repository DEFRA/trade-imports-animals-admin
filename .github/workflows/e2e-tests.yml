name: E2E Tests

on:
  workflow_run:
    workflows: ["Publish Branch Image"]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to probe for service images (defaults to current branch)'
        required: false
        type: string

permissions:
  statuses: write

jobs:
  e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'pull_request')
    uses: DEFRA/trade-imports-animals-workspace/.github/workflows/e2e-tests.yml@main
    with:
      branch: ${{ inputs.branch || github.event.workflow_run.head_branch || github.ref_name }}
    secrets: inherit

  report-status:
    needs: e2e
    if: >
      always() &&
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Set commit status on PR
        uses: actions/github-script@v7
        with:
          script: |
            const e2eResult = '${{ needs.e2e.result }}';
            const state = e2eResult === 'success' ? 'success'
                        : e2eResult === 'skipped' ? 'pending'
                        : 'failure';
            const prs = context.payload.workflow_run.pull_requests;
            for (const pr of prs) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: pr.head.sha,
                state,
                context: 'E2E Tests',
                description: `Workspace E2E: ${e2eResult}`,
                target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            }
